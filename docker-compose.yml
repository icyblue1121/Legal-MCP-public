x-legal-mcp-image: &legal-mcp-image legal-mcp:v0.5.10

services:
  legal-mcp:
    image: *legal-mcp-image
    pull_policy: never
    ports:
      - "8765:8765"
    environment:
      LEGAL_MCP_AGENT_PUBLIC_ONLY: "true"
      # Only the Feishu app creds are injected (substituted from ./.env at compose
      # time) so the read-through `project` source can authenticate. Kept narrow on
      # purpose — not the whole .env — so unrelated vars don't change gateway behavior.
      FEISHU_APP_ID: ${FEISHU_APP_ID:?set FEISHU_APP_ID in .env}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:?set FEISHU_APP_SECRET in .env}
    volumes:
      - ./data:/data
    command:
      - sh
      - -c
      - legal-mcp serve-http --host 0.0.0.0 --port 8765 --db /data/legal.db --audit-log /data/audit.jsonl --agent-public-only
  legal-mcp-admin:
    image: *legal-mcp-image
    pull_policy: never
    ports:
      - "127.0.0.1:8766:8766"
    environment:
      # serve-admin --connector loads the same config; it needs the app creds present
      # to build the source (no network call at startup — the token is fetched lazily).
      FEISHU_APP_ID: ${FEISHU_APP_ID:?set FEISHU_APP_ID in .env}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:?set FEISHU_APP_SECRET in .env}
    volumes:
      - ./data:/data
    command:
      - sh
      - -c
      - legal-mcp serve-admin --host 0.0.0.0 --port 8766 --db /data/legal.db
